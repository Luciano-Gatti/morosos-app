spring:
  application:
    name: morosos-service
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/morosos_db
    username: morosos_user
    password: morosos_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  # 8080 queda reservado para auth; este servicio de gestión de morosos corre en 8081.
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins:
      - http://localhost:8081
      - http://localhost:8080
      - http://localhost:5173
      - http://127.0.0.1:8081
      - http://127.0.0.1:5173
  security:
    jwt:
      issuer: ${JWT_ISSUER:http://localhost:8080}
      audience: ${JWT_AUDIENCE:morosos-app}
      secret: ${JWT_SECRET:3HugO1JOjAKmVZYTMKO6NqWGqvTJ5xO41wiBWyqnuAnDgwo2RrUVqpOJ4I4kWjzyMfBLTWUjw3UV0VeXkjWOpA}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
