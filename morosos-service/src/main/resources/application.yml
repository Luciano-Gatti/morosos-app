spring:
  application:
    name: morosos-service
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/morosos_db
    username: morosos_user
    password: morosos_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
