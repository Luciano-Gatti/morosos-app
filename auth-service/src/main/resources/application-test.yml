server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:auth_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
