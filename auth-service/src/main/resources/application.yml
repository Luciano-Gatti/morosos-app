server:
  port: ${AUTH_SERVICE_PORT:8080}

spring:
  application:
    name: auth-service
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}
      - http://127.0.0.1:5173
